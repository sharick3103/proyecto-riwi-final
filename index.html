<!doctype html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>RiwiFlow — Kanban</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "secondary-fixed": "#e3e1ed",
            tertiary: "#6b3000",
            "surface-container-lowest": "#ffffff",
            "on-primary-fixed-variant": "#5b00c5",
            "on-tertiary-container": "#ffc19e",
            "surface-container-low": "#f9f1ff",
            secondary: "#5d5d67",
            "on-secondary-container": "#64636d",
            "inverse-on-surface": "#f6eefc",
            "surface-dim": "#dfd7e5",
            error: "#ba1a1a",
            "secondary-fixed-dim": "#c7c5d1",
            "on-primary-container": "#dac5ff",
            "surface-variant": "#e8e0ee",
            surface: "#fef7ff",
            "inverse-primary": "#d3bbff",
            "on-error": "#ffffff",
            "surface-container-highest": "#e8e0ee",
            "secondary-container": "#e3e1ed",
            "on-primary-fixed": "#250059",
            "on-secondary-fixed-variant": "#46464f",
            "surface-container": "#f3ebf9",
            "primary-container": "#6d28d9",
            "outline-variant": "#ccc3d7",
            "primary-fixed": "#ebddff",
            "on-tertiary": "#ffffff",
            "surface-container-high": "#ede5f3",
            "surface-bright": "#fef7ff",
            "primary-fixed-dim": "#d3bbff",
            "on-primary": "#ffffff",
            outline: "#7b7486",
            "on-secondary": "#ffffff",
            "on-tertiary-fixed-variant": "#743400",
            background: "#fef7ff",
            "tertiary-container": "#8f4200",
            "on-secondary-fixed": "#1a1b23",
            "error-container": "#ffdad6",
            "on-background": "#1d1a24",
            primary: "#5300b7",
            "surface-tint": "#7331df",
            "on-error-container": "#93000a",
            "on-surface-variant": "#4a4455",
            "tertiary-fixed-dim": "#ffb68b",
            "on-surface": "#1d1a24",
            "on-tertiary-fixed": "#321300",
            "tertiary-fixed": "#ffdbc8",
            "inverse-surface": "#332f39",
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            full: "0.75rem",
          },
          spacing: {
            md: "16px",
            xxl: "48px",
            xl: "32px",
            xs: "4px",
            sm: "8px",
            gutter: "24px",
            lg: "24px",
            "margin-mobile": "16px",
          },
          fontFamily: {
            "display-lg-mobile": ["Inter"],
            "body-sm": ["Inter"],
            "label-sm": ["Inter"],
            "title-sm": ["Inter"],
            "headline-md": ["Inter"],
            "display-lg": ["Inter"],
            "body-md": ["Inter"],
            "label-md": ["Inter"],
          },
          fontSize: {
            "display-lg-mobile": [
              "30px",
              {
                lineHeight: "38px",
                letterSpacing: "-0.02em",

            ],
            "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
            "label-sm": [
              "12px",
              {
                lineHeight: "16px",
                letterSpacing: "0.05em",

              },
            ],
            "title-sm": ["18px", { lineHeight: "28px", fontWeight: "500" }],
            "headline-md": [
              "24px",
              {
                lineHeight: "32px",
                letterSpacing: "-0.01em",
                fontWeight: "600",
              },
            ],
            "display-lg": [
              "36px",
              {
                lineHeight: "44px",
                letterSpacing: "-0.02em",
                fontWeight: "600",
              },
            ],
            "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
            "label-md": ["14px", { lineHeight: "20px", fontWeight: "500" }],
          },
        },
      },
    };
  </script>
  <style>
    body {
      font-family: "Inter", sans-serif;
    }

    .material-symbols-outlined {
      font-variation-settings:
        "FILL" 0,
        "wght" 400,
        "GRAD" 0,
        "opsz" 24;
      display: inline-block;
      vertical-align: middle;
      line-height: 1;
    }

    /* Kanban board styles */
    .kanban-column {
      min-width: 280px;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #ccc3d7;
      border-radius: 10px;
    }

    .task-card:hover {
      transform: translateY(-2px);
      transition: all 0.2s ease;
    }

    /* Login styles */
    .input-focus-ring:focus {
      outline: none;
      border-color: #5300b7;
      box-shadow: 0 0 0 2px #ebddff;
    }

    /* Modal styles */
    .modal-overlay {
      animation: fadeIn 0.15s ease;
    }

    .modal-panel {
      animation: slideUp 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Toast styles */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      animation: toastIn 0.25s ease;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(24px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Loading spinner */
    #app-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #fef7ff;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #ebddff;
      border-top-color: #5300b7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <!-- Mount point for the SPA -->
  <div id="app">
    <div id="app-loading">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Toast notification container -->
  <div id="toast-container"></div>

  <!-- SPA Bootstrap -->
  <script type="module" src="src/app.js"></script>
</body>

</html>
